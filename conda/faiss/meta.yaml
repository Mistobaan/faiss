{% set describe_tag = environ.get('GIT_DESCRIBE_TAG', '') %}
{% set version = describe_tag.lstrip('v') if describe_tag else environ.get('FAISS_CONDA_VERSION', '1.14.1') %}
{% set suffix = "_nightly" if environ.get('PACKAGE_TYPE') == 'nightly' else "" %}
{% set number = environ.get('GIT_DESCRIBE_NUMBER', 0) %}
{% set untagged_suffix = '' %}
{% if environ.get('FAISS_CONDA_UNTAGGED', '') == '1' %}
{% set branch_tag = environ.get('FAISS_CONDA_BRANCH_TAG', 'untagged') %}
{% set short_sha = environ.get('FAISS_CONDA_SHORT_SHA', 'unknown') %}
{% set untagged_suffix = '_' ~ branch_tag ~ '_' ~ short_sha %}
{% endif %}

package:
  name: faiss-pkg
  version: {{ version }}

build:
  number: {{ number }}

about:
  home: https://github.com/facebookresearch/faiss
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: A library for efficient similarity search and clustering of dense vectors.

source:
  git_url: ../../

outputs:
  - name: libfaiss
    script: build-lib-osx-arm64.sh  # [osx and arm64]
    script: build-lib.sh  # [x86_64 and not win and not osx]
    script: build-lib-osx.sh  # [x86_64 and osx]
    script: build-lib-arm64.sh  # [not x86_64 and not osx]
    script: build-lib.bat  # [win]
    build:
      string: "py{{ PY_VER }}_h{{ PKG_HASH }}_{{ number }}_metal{{ suffix }}{{ untagged_suffix }}"  # [osx and arm64]
      string: "py{{ PY_VER }}_h{{ PKG_HASH }}_{{ number }}_cpu{{ suffix }}"  # [not (osx and arm64)]
      run_exports:
        - {{ pin_compatible('libfaiss', exact=True) }}
    requirements:
      build:
        - python {{ python }}
        - {{ compiler('cxx') }}
        - libcxx =20.1.1  # [osx and arm64]
        - sysroot_linux-64 =2.17 # [linux64]
        - llvm-openmp  # [osx or linux64]
        - cmake >=3.24.0
        - make =4.2 # [not win and not (osx and arm64)]
        - make =4.4 # [osx and arm64]
        {% if PY_VER == '3.10' or PY_VER == '3.11' %}
        - mkl-devel >=2024.2.2  # [x86_64]
        - python_abi <3.12
        {% elif PY_VER == '3.12' %}
        - mkl-devel >=2024.2.2  # [x86_64 and not win]
        - mkl-devel >=2024.2.2  # [x86_64 and win]
        - python_abi =3.12
        {% else %}
        - mkl-devel >=2024.2.2  # [x86_64 and not win]
        - mkl-devel >=2024.2.2  # [x86_64 and win]
        - python_abi
        {% endif %}
        - libopenblas =0.3.32  # [osx]
      host:
        - python {{ python }}
        - libcxx =20.1.1  # [osx and arm64]
        - libsvs-runtime =0.3.0  # [x86_64 and linux]
        {% if PY_VER == '3.10' or PY_VER == '3.11' %}
        - mkl >=2024.2.2  # [x86_64]
        - python_abi <3.12
        {% elif PY_VER == '3.12' %}
        - mkl >=2024.2.2  # [x86_64 and not win]
        - mkl >=2024.2.2  # [x86_64 and win]
        - python_abi =3.12
        {% endif %}
        - openblas =0.3.32  # [not x86_64]
        - libopenblas =0.3.32  # [osx]
      run:
        - python {{ python }}
        - libcxx =20.1.1  # [osx and arm64]
        - libsvs-runtime =0.3.0  # [x86_64 and linux]
        {% if PY_VER == '3.10' or PY_VER == '3.11' %}
        - mkl >=2024.2.2  # [x86_64]
        - python_abi <3.12
        {% elif PY_VER == '3.12' %}
        - mkl >=2024.2.2  # [x86_64 and not win]
        - mkl >=2024.2.2  # [x86_64 and win]
        - python_abi =3.12
        {% endif %}
        - openblas =0.3.32  # [not x86_64]
        - libopenblas =0.3.32  # [osx]
    test:
      requires:
        - conda-build =25.1.2
      commands:
        - test -f $PREFIX/lib/libfaiss$SHLIB_EXT       # [not win]
        - test -f $PREFIX/lib/libfaiss_avx2$SHLIB_EXT  # [x86_64 and not win]
        - nm -gU $PREFIX/lib/libfaiss$SHLIB_EXT | grep faiss_metal_runtime_available  # [osx and arm64]
        - test ! -f $PREFIX/lib/libfaiss_metal$SHLIB_EXT  # [osx and arm64]
        - conda inspect linkages -p $PREFIX $PKG_NAME  # [not win]
        - conda inspect objects -p $PREFIX $PKG_NAME   # [osx]

  - name: faiss-cpu
    script: build-pkg-osx-arm64.sh  # [osx and arm64]
    script: build-pkg.sh  # [x86_64 and not win and not osx]
    script: build-pkg-osx.sh  # [x86_64 and osx]
    script: build-pkg-arm64.sh # [not x86_64 and not osx]
    script: build-pkg.bat  # [win]
    build:
      string: "py{{ PY_VER }}_h{{ PKG_HASH }}_{{ number }}_metal{{ suffix }}{{ untagged_suffix }}"  # [osx and arm64]
      string: "py{{ PY_VER }}_h{{ PKG_HASH }}_{{ number }}_cpu{{ suffix }}"  # [not (osx and arm64)]
    requirements:
      build:
        - python {{ python }}
        - {{ compiler('cxx') }}
        - libcxx =20.1.1  # [osx and arm64]
        - sysroot_linux-64 =2.17 # [linux64]
        - swig =4.0
        - cmake >=3.24.0
        - make =4.2 # [not win and not (osx and arm64)]
        - make =4.4 # [osx and arm64]
        - _openmp_mutex =4.5=2_kmp_llvm  # [x86_64 and not win]
        {% if PY_VER == '3.10' or PY_VER == '3.11' %}
        - mkl >=2024.2.2  # [x86_64]
        - python_abi <3.12
        {% elif PY_VER == '3.12' %}
        - mkl >=2024.2.2  # [x86_64 and not win]
        - mkl >=2024.2.2  # [x86_64 and win]
        - python_abi =3.12
        {% endif %}
        - libopenblas =0.3.32  # [osx]
      host:
        - python {{ python }}
        - numpy >=2.0,<3.0
        - pip  # [osx and arm64]
        - packaging  # [osx and arm64]
        - setuptools >=80  # [osx and arm64]
        - setuptools  # [not (osx and arm64)]
        - wheel  # [osx and arm64]
        - {{ pin_subpackage('libfaiss', exact=True) }}
        - libcxx =20.1.1  # [osx and arm64]
        - _openmp_mutex =4.5=2_kmp_llvm  # [x86_64 and not win]
        {% if PY_VER == '3.10' or PY_VER == '3.11' %}
        - mkl >=2024.2.2  # [x86_64]
        - python_abi <3.12
        {% elif PY_VER == '3.12' %}
        - mkl >=2024.2.2  # [x86_64 and not win]
        - mkl >=2024.2.2  # [x86_64 and win]
        - python_abi =3.12
        {% endif %}
        - libopenblas =0.3.32  # [osx]
      run:
        - python {{ python }}
        - numpy >=2.0,<3.0
        - {{ pin_subpackage('libfaiss', exact=True) }}
        - libcxx =20.1.1  # [osx and arm64]
        {% if PY_VER == '3.10' or PY_VER == '3.11' %}
        - mkl >=2024.2.2  # [x86_64]
        - python_abi <3.12
        {% elif PY_VER == '3.12' %}
        - mkl >=2024.2.2  # [x86_64 and not win]
        - mkl >=2024.2.2  # [x86_64 and win]
        - python_abi =3.12
        {% endif %}
        - libopenblas =0.3.32  # [osx]
    test:
      requires:
        - numpy >=2.0,<3.0
        - scipy
        - pytorch-cpu >=2.7
        {% if PY_VER == '3.10' or PY_VER == '3.11' %}
        - mkl >=2024.2.2  # [x86_64]
        - python_abi <3.12
        {% elif PY_VER == '3.12' %}
        - mkl >=2024.2.2  # [x86_64 and not win]
        - mkl >=2024.2.2  # [x86_64 and win]
        - python_abi =3.12
        {% endif %}
      commands:
        - python -X faulthandler -m unittest discover -v -s tests/ -p "test_*"
        - python -X faulthandler -m unittest discover -v -s tests/ -p "torch_*"
        - python -X faulthandler -m unittest discover -v -s faiss/metal/test -p "test_metal_*.py"  # [osx and arm64]
        - python -X faulthandler -c "import faiss, numpy as np; assert 'METAL' in faiss.get_compile_options().split(); res = faiss.StandardMetalResources(); index = faiss.MetalIndexFlatL2(res, 4); x = np.arange(8, dtype='float32').reshape(2, 4); index.add(x); D, I = index.search(x, 1); assert I.shape == (2, 1)"  # [osx and arm64]
        - sh test_cpu_dispatch.sh  # [linux64]
      files:
        - test_cpu_dispatch.sh  # [linux64]
      source_files:
        - tests/
        - faiss/metal/test/  # [osx and arm64]
