name: Metal macOS

on:
  push:
    branches:
      - osx-arm64-metal
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or ref to build from Mistobaan/faiss
        required: false
        default: osx-arm64-metal
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  OMP_NUM_THREADS: "10"
  MKL_THREADING_LAYER: GNU

jobs:
  metal-macos-wheel:
    name: Metal macOS (wheel, ${{ matrix.macos_target }})
    if: github.repository == 'Mistobaan/faiss'
    runs-on: ${{ matrix.runs_on }}
    permissions:
      contents: read
    timeout-minutes: 90
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: macos-14
            macos_target: "14.0"
            artifact_suffix: macosx_14_0_arm64
          - runs_on: macos-15
            macos_target: "15.0"
            artifact_suffix: macosx_15_0_arm64
    env:
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_target }}
    concurrency:
      group: metal-macos-${{ matrix.artifact_suffix }}-${{ github.event_name == 'push' && github.ref || github.event_name == 'workflow_dispatch' && inputs.ref || 'osx-arm64-metal' }}
      cancel-in-progress: true
    steps:
      - name: Checkout push ref
        if: github.event_name == 'push'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      # Scheduled workflows run from the default branch, so they need an
      # explicit checkout of the target backend branch in the Mistobaan fork.
      - name: Checkout Mistobaan osx-arm64-metal branch
        if: github.event_name != 'push'
        uses: actions/checkout@v6
        with:
          repository: Mistobaan/faiss
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || 'osx-arm64-metal' }}
          fetch-depth: 0
          fetch-tags: true

      - name: Export package metadata
        id: meta
        shell: bash
        run: |
          branch_name="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-$(git branch --show-current)}}"
          short_sha="$(git rev-parse --short HEAD)"
          branch_tag="$(printf '%s' "$branch_name" | tr -c 'A-Za-z0-9_.-' '_' | sed -E 's/^_+//; s/_+$//')"
          major="$(awk '/^#define FAISS_VERSION_MAJOR / { print $3 }' faiss/Index.h)"
          minor="$(awk '/^#define FAISS_VERSION_MINOR / { print $3 }' faiss/Index.h)"
          patch="$(awk '/^#define FAISS_VERSION_PATCH / { print $3 }' faiss/Index.h)"
          if [ -z "$branch_tag" ]; then
            branch_tag="detached"
          fi

          version="${major}.${minor}.${patch}"
          echo "version=$version"         >> "$GITHUB_OUTPUT"
          echo "branch_tag=$branch_tag"   >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha"     >> "$GITHUB_OUTPUT"
          echo "branch_name=$branch_name" >> "$GITHUB_OUTPUT"

      # ── Conda toolchain / dependencies ─────────────────────────────────
      - name: Set up conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: faiss-metal
          python-version: "3.12"
          channels: conda-forge
          channel-priority: strict
          auto-activate-base: false

      - name: Install conda dependencies
        run: scripts/ci/install-metal-deps-osx-arm64.sh

      # ── Build wheel (PEP 427 / PEP 425) ────────────────────────────────
      - name: Build faiss-metal wheel
        run: scripts/ci/build-metal-wheel-osx-arm64.sh

      # ── Upload wheel as artifact ────────────────────────────────────────
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: faiss-metal-wheel-${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.short_sha }}-${{ matrix.artifact_suffix }}
          path: dist/*.whl
          if-no-files-found: error

      # ── Smoke test / Python tests ──────────────────────────────────────
      - name: Run wheel smoke test and unit tests
        run: scripts/ci/test-metal-wheel-osx-arm64.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: faiss-metal-test-results-${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.short_sha }}-${{ matrix.artifact_suffix }}
          path: test-results
          if-no-files-found: warn

  # ── Conda build (validation only, no upload) ────────────────────────
  metal-macos-conda:
    name: Metal macOS (conda)
    needs: metal-macos-wheel
    if: github.repository == 'Mistobaan/faiss'
    runs-on: macos-14
    permissions:
      contents: read
    timeout-minutes: 90
    defaults:
      run:
        shell: bash
    concurrency:
      group: metal-macos-conda-${{ github.event_name == 'push' && github.ref || github.event_name == 'workflow_dispatch' && inputs.ref || 'osx-arm64-metal' }}
      cancel-in-progress: true
    steps:
      - name: Checkout push ref
        if: github.event_name == 'push'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Checkout Mistobaan osx-arm64-metal branch
        if: github.event_name != 'push'
        uses: actions/checkout@v6
        with:
          repository: Mistobaan/faiss
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || 'osx-arm64-metal' }}
          fetch-depth: 0
          fetch-tags: true

      - name: Export conda package metadata
        shell: bash
        run: |
          branch_name="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-$(git branch --show-current)}}"
          short_sha="$(git rev-parse --short HEAD)"
          branch_tag="$(printf '%s' "$branch_name" | tr -c 'A-Za-z0-9_.-' '_' | sed -E 's/^_+//; s/_+$//')"
          major="$(awk '/^#define FAISS_VERSION_MAJOR / { print $3 }' faiss/Index.h)"
          minor="$(awk '/^#define FAISS_VERSION_MINOR / { print $3 }' faiss/Index.h)"
          patch="$(awk '/^#define FAISS_VERSION_PATCH / { print $3 }' faiss/Index.h)"
          if [ -z "$branch_tag" ]; then
            branch_tag="detached"
          fi

          {
            echo "FAISS_CONDA_BRANCH_NAME=$branch_name"
            echo "FAISS_CONDA_BRANCH_TAG=$branch_tag"
            echo "FAISS_CONDA_SHORT_SHA=$short_sha"
            echo "FAISS_CONDA_VERSION=${major}.${minor}.${patch}"
          } >> "$GITHUB_ENV"

          if ! git describe --tags --long >/dev/null 2>&1; then
            echo "FAISS_CONDA_UNTAGGED=1" >> "$GITHUB_ENV"
          fi

      - name: Build Metal backend (conda, no upload)
        uses: ./.github/actions/build_conda
        with:
          recipe: faiss
