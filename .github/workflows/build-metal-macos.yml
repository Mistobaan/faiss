name: Metal macOS

on:
  push:
    branches:
      - metal
  workflow_dispatch:
    inputs:
      ref:
        description: Branch or ref to build from Mistobaan/faiss
        required: false
        default: metal
        type: string
  schedule:
    - cron: "0 6 * * 0"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  OMP_NUM_THREADS: "10"
  MKL_THREADING_LAYER: GNU

jobs:
  metal-macos-wheel:
    name: Metal macOS (wheel)
    if: github.repository == 'Mistobaan/faiss'
    runs-on: macos-14
    permissions:
      contents: read
    concurrency:
      group: metal-macos-${{ github.event_name == 'push' && github.ref || github.event_name == 'workflow_dispatch' && inputs.ref || 'metal' }}
      cancel-in-progress: true
    steps:
      - name: Checkout push ref
        if: github.event_name == 'push'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      # Scheduled workflows run from the default branch, so they need an
      # explicit checkout of the target backend branch in the Mistobaan fork.
      - name: Checkout Mistobaan metal branch
        if: github.event_name != 'push'
        uses: actions/checkout@v6
        with:
          repository: Mistobaan/faiss
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || 'metal' }}
          fetch-depth: 0
          fetch-tags: true

      - name: Export package metadata
        id: meta
        shell: bash
        run: |
          branch_name="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-$(git branch --show-current)}}"
          short_sha="$(git rev-parse --short HEAD)"
          branch_tag="$(printf '%s' "$branch_name" | tr -c 'A-Za-z0-9_.-' '_' | sed -E 's/^_+//; s/_+$//')"
          major="$(awk '/^#define FAISS_VERSION_MAJOR / { print $3 }' faiss/Index.h)"
          minor="$(awk '/^#define FAISS_VERSION_MINOR / { print $3 }' faiss/Index.h)"
          patch="$(awk '/^#define FAISS_VERSION_PATCH / { print $3 }' faiss/Index.h)"
          if [ -z "$branch_tag" ]; then
            branch_tag="detached"
          fi

          version="${major}.${minor}.${patch}"
          echo "version=$version"         >> "$GITHUB_OUTPUT"
          echo "branch_tag=$branch_tag"   >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha"     >> "$GITHUB_OUTPUT"
          echo "branch_name=$branch_name" >> "$GITHUB_OUTPUT"

      # ── System dependencies ─────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          brew install cmake swig libomp openblas

      # ── Python toolchain ────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      # ── Build wheel (PEP 427 / PEP 425) ────────────────────────────────
      - name: Build faiss-metal wheel
        env:
          # Help CMake find Homebrew OpenBLAS
          CMAKE_PREFIX_PATH: "/opt/homebrew/opt/openblas;/opt/homebrew/opt/libomp"
          MACOSX_DEPLOYMENT_TARGET: "14.0"
        run: |
          uv build --wheel faiss/python/ \
            --out-dir dist/ \
            -Ccmake.define.FAISS_ENABLE_METAL=ON \
            -Ccmake.define.FAISS_ENABLE_GPU=OFF \
            -Ccmake.define.FAISS_ENABLE_C_API=ON \
            -Ccmake.define.FAISS_ENABLE_MKL=OFF \
            -Ccmake.define.BUILD_SHARED_LIBS=ON \
            -Ccmake.define.BUILD_TESTING=OFF \
            -Ccmake.define.FAISS_ENABLE_EXTRAS=OFF \
            -Ccmake.define.OpenMP_CXX_FLAGS="-Xpreprocessor -fopenmp -I/opt/homebrew/opt/libomp/include" \
            -Ccmake.define.OpenMP_CXX_LIB_NAMES="omp" \
            -Ccmake.define.OpenMP_omp_LIBRARY="/opt/homebrew/opt/libomp/lib/libomp.dylib"

      - name: List built wheels
        run: ls -lh dist/*.whl

      # ── Upload wheel as artifact ────────────────────────────────────────
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: faiss-metal-wheel-${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.short_sha }}
          path: dist/*.whl
          if-no-files-found: error

      # ── Smoke test ──────────────────────────────────────────────────────
      - name: Install wheel and run smoke test
        run: |
          uv venv .venv-test
          source .venv-test/bin/activate
          uv pip install dist/*.whl numpy scipy
          python -X faulthandler -c "
          import faiss, numpy as np
          opts = faiss.get_compile_options().split()
          print('Compile options:', opts)
          assert 'METAL' in opts, f'METAL not in compile options: {opts}'
          res = faiss.StandardMetalResources()
          index = faiss.MetalIndexFlatL2(res, 4)
          x = np.arange(8, dtype='float32').reshape(2, 4)
          index.add(x)
          D, I = index.search(x, 1)
          assert I.shape == (2, 1)
          print('Metal smoke test passed ✓')
          "

      - name: Run unit tests
        run: |
          source .venv-test/bin/activate
          uv pip install pytest torch
          python -X faulthandler -m pytest tests/ -v --timeout=120 || true
          python -X faulthandler -m unittest discover -v -s faiss/metal/test -p "test_metal_*.py"
